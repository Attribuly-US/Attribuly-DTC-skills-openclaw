name: Sync Skills to ClawHub

on:
  push:
    branches:
      - main
    paths:
      - 'SKILL.md'
      - 'references/**'

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }} 
        run: |
          # Ensure token is available
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "Error: CLAWHUB_TOKEN secret is not set."
            exit 1
          fi

          echo "🚀 Publishing attribuly-dtc-analyst bundle to ClawHub..."
          # The current repository root is the skill bundle
          clawhub publish . --token "$CLAWHUB_TOKEN" || echo "⚠️ Failed to publish skill bundle"
